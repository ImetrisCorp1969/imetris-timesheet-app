name: Timesheet Reminders

on:
  schedule:
    - cron: '0 14 * * 5'  # Fri 09:00 America/Detroit (14:00 UTC)
    - cron: '0 0 * * 1'   # Sun 20:00 America/Detroit (Mon 00:00 UTC)
    - cron: '0 15 * * 1'  # Mon 10:00 America/Detroit (15:00 UTC)
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth pytz
      - name: Run reminder script
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          python scripts/send_reminders.py
